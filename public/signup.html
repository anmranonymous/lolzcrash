<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — LolzCrash</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <a href="/" class="nav-logo">LOLZ<span>CRASH</span></a>
  <div class="nav-links">
    <a href="/login">Login</a>
  </div>
</nav>
<div class="auth-container">
  <div class="auth-card">
    <h2>Create Account</h2>
    <p>Join now and get 10–20 PKR welcome bonus! 🎁</p>
    <div class="alert alert-info">🎁 New users receive a <strong>10–20 PKR welcome bonus</strong> instantly!</div>
    <div class="input-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="CrashKing123">
    </div>
    <div class="input-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 6 characters">
    </div>
    <button class="btn btn-primary w-full mt-2" id="signupBtn" style="justify-content:center">🚀 Create Account</button>
    <p class="text-center mt-2" style="color:var(--text-dim);font-size:0.9rem">
      Already have an account? <a href="/login" style="color:var(--accent)">Login here</a>
    </p>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
document.getElementById('signupBtn').addEventListener('click', async () => {
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !email || !password) return toast('Fill all fields', 'error');
  if (password.length < 6) return toast('Password must be at least 6 characters', 'error');
  const btn = document.getElementById('signupBtn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  const data = await api('/api/signup', 'POST', { username, email, password });
  if (data.success) {
    toast(`🎉 ${data.msg}`, 'success');
    setTimeout(() => window.location.href = '/dashboard', 1200);
  } else { toast(data.msg, 'error'); btn.disabled = false; btn.textContent = '🚀 Create Account'; }
});
</script>
</body>
</html>

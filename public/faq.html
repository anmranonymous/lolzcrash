  el.innerHTML = `<div class="faq-question">${f.q}<span class="faq-chevron">▼</span></div><div class="faq-answer">${f.a}</div>`;
  el.querySelector('.faq-question').addEventListener('click', () => el.classList.toggle('open'));

});

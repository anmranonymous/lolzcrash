<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — LolzCrash</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <h2 style="color:var(--accent2)">🔐 Admin Panel</h2>
    <p>Enter admin secret code to continue</p>
    <div class="input-group">
      <label>Secret Code</label>
      <input type="password" id="adminCode" placeholder="••••••••">
    </div>
    <button class="btn btn-danger w-full mt-2" id="adminLoginBtn" style="justify-content:center">🔓 Access Admin Panel</button>
    <p class="text-center mt-2"><a href="/" style="color:var(--text-dim);font-size:0.85rem">← Back to Site</a></p>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
document.getElementById('adminLoginBtn').addEventListener('click', async () => {
  const code = document.getElementById('adminCode').value;
  const data = await api('/api/admin/login', 'POST', { code });
  if (data.success) { toast('Access granted!', 'success'); setTimeout(() => window.location.href = '/admin', 800); }
  else toast(data.msg || 'Invalid code', 'error');
});
document.getElementById('adminCode').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('adminLoginBtn').click(); });
</script>
</body>
</html>

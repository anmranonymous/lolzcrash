<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — LolzCrash</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <a href="/" class="nav-logo">LOLZ<span>CRASH</span></a>
  <div class="nav-links">
    <a href="/signup" class="btn btn-primary btn-sm">Sign Up</a>
  </div>
</nav>
<div class="auth-container">
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <p>Sign in to continue playing</p>
    <div class="input-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary w-full mt-2" id="loginBtn" style="justify-content:center">🔐 Login</button>
    <p class="text-center mt-2" style="color:var(--text-dim);font-size:0.9rem">
      No account? <a href="/signup" style="color:var(--accent)">Sign up & get bonus!</a>
    </p>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) return toast('Fill all fields', 'error');
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Logging in...';
  const data = await api('/api/login', 'POST', { email, password });
  if (data.success) { toast('Logged in!', 'success'); setTimeout(() => window.location.href = '/dashboard', 800); }
  else { toast(data.msg, 'error'); btn.disabled = false; btn.textContent = '🔐 Login'; }
});
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });
</script>
</body>
</html>
